<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Set Target | VibhuARMS</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@latest/dist/style.css" rel="stylesheet" />
    <link href="/static/styles.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/js/all.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
</head>
<body class="sb-nav-fixed">
    {% include 'admin/navbar.html' %}
    <br><br>
    <div class="container-fluid px-4">
        <h3 class="mt-4">Set Target</h3>
        <hr /> 
        {% if message %}
                <script>
                    window.onload = function() {
                        alert('{{ message }}');
                    };
                </script>
            {% endif %}
        <div class="row justify-content-center">
            <div class="col-lg-5">
                
                <form id="radioForm">
                    <table class="table table-bordered" style="text-align: center;">
                        <tr>
                            <td style="width: 50%;"><input type="radio" id="existing" name="choice" value="existing">  EXISTING</td>
                            <td style="width: 50%;"><input type="radio" id="new" name="choice" value="new">  NEW</td>
                        </tr>
                    </table>                    
                </form>

    
                <!-- Content for Existing -->
                <form id="existingForm" action="/load_target" method="post" style="display: none;">
      
                    <Center>Select Category:</Center>
                    <table class="table table-bordered" style="text-align: center;">
                        <tr>
                            <td><input type="radio" id="naac" name="assessment" value="NAAC">  NAAC</td>
                            <td><input type="radio" id="nirf" name="assessment" value="NIRF">  NIRF</td>
                            <td><input type="radio" id="nba" name="assessment" value="NBA">  NBA</td>
                        </tr>
                    </table>

                    <div class="form-floating mb-3">
                        <input class="form-control" name="parameterid" type="text" placeholder="Parameter ID" required />
                        <label for="inputParameterid">Parameter ID / Metric ID</label>
                    </div>

                    <center><button type="submit" class="btn btn-primary mt-3"">Submit</button></center><br>
                </form>


                <form id="calendarForm" action="/set_target_part1" method="post" style="display: none;">
           
                    <Center>Select Category:</Center>
                    <table class="table table-bordered" style="text-align: center;">
                        <tr>
                            <td><input type="radio" id="naac" name="assessment" value="NAAC">  NAAC</td>
                            <td><input type="radio" id="nirf" name="assessment" value="NIRF">  NIRF</td>
                            <td><input type="radio" id="nba" name="assessment" value="NBA">  NBA</td>
                        </tr>
                    </table>

                    <div class="form-floating mb-3">
                        <input class="form-control" name="parameterid" type="text" placeholder="Parameter ID" value="{{ parameter_id }}" />
                        <label for="inputParameterid">Parameter ID / Metric ID</label>
                    </div>

                    <h2>Select Calendar Type</h2>
                    <select id="calendarSelect" name="calendarSelect" class="form-select mt-3" onchange="reloadPage()">
                        <option value="default">Select Calendar</option>
                        <option value="Academic">Academic Calendar</option>
                        <option value="Finance">Finance Calendar</option>
                        <option value="Research">Research Calendar</option>
                    </select>
                    
                    <div id="calendarDisplay" class="mt-4" style="display: none;">
                        <h3>Select Month</h3>
                        <div class="mb-3">
                            <label for="startMonth" class="form-label">Start Month:</label>
                            <input type="month" id="startMonth" name="startMonth" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label for="endMonth" class="form-label">End Month:</label>
                            <input type="month" id="endMonth" name="endMonth" class="form-control">
                        </div>
                    </div>
                    
                    <!-- Department Selection -->
                    <div id="departmentSelection" class="mt-4" style="display: none;">
                        <h3>Select Department</h3>
                        <select id="departmentSelect" name="departmentSelect" class="form-select mt-3" onchange="loadPrograms()">
                            <option value="default">Select Department</option>
                            <option value="Engineering">Engineering</option>
                            <option value="Medical">Medical</option>
                            <option value="Management">Management</option>
                        </select>
                    </div>

                    <!-- Program Selection -->
                    <div id="programSelection" class="mt-4" style="display: none;">
                        <h3>Select Program</h3>
                        <select id="programSelect" name="programSelect" class="form-select mt-3">
                            <!-- Options will be dynamically populated based on the department selected -->
                        </select>
                    </div>

                    <center>
                        <button id="submitButton" type="submit" class="btn btn-primary mt-3" style="display: none;">Submit</button>
                    </center>
                    <br>
                </form>
            </div>
        </div>
    </div>

    
    <script>
        // Handle radio button change
        $('input[type="radio"][name="assessment"]').change(function() {
            if (this.value === 'NAAC') {
                $('input[name="parameterid"]').val('NAAC');
            } else if (this.value === 'NIRF') {
                $('input[name="parameterid"]').val('NIRF');
            } else if (this.value === 'NBA') {
                $('input[name="parameterid"]').val('NBA');
            }
        });
    </script>

    <script>
        $(document).ready(function() {
            $('input[type="radio"]').click(function() {
                var choice = $(this).val();
                if (choice === 'existing') {
                    $('#existingForm').show();
                    $('#calendarForm').hide();
                } else if (choice === 'new') {
                    $('#existingForm').hide();
                    $('#calendarForm').show();
                    // Call reloadPage when 'new' radio button is clicked
                    reloadPage();
                }
            });

            $('#calendarSelect').change(function() {
                // Call reloadPage when the calendar select is changed
                reloadPage();
            });

            function reloadPage() {
                var selectedOption = document.getElementById('calendarSelect').value;
                if (selectedOption !== 'default') {
                    document.getElementById('calendarDisplay').style.display = 'block';

                    var startMonthInput = document.getElementById('startMonth');
                    var endMonthInput = document.getElementById('endMonth');

                    var currentYear = new Date().getFullYear();

                    if (selectedOption === 'Academic') {
                        startMonthInput.value = currentYear + '-06';
                        endMonthInput.value = (currentYear + 1) + '-05';
                    } else if (selectedOption === 'Finance') {
                        startMonthInput.value = currentYear + '-04';
                        endMonthInput.value = (currentYear + 1) + '-03';
                    } else if (selectedOption === 'Research') {
                        startMonthInput.value = currentYear + '-01';
                        endMonthInput.value = currentYear + '-12';
                    }

                    document.getElementById('departmentSelection').style.display = 'block';
                } else {
                    document.getElementById('calendarDisplay').style.display = 'none';
                    document.getElementById('departmentSelection').style.display = 'none';
                    document.getElementById('programSelection').style.display = 'none';
                    document.getElementById('submitButton').style.display = 'none'; // Hide submit button
                }
            }

        
            $('#departmentSelect').change(function() {
                // Call reloadPage when the calendar select is changed
                loadPrograms();
            });

            function loadPrograms() {
                var selectedDepartment = document.getElementById('departmentSelect').value;
                var programSelect = document.getElementById('programSelect');
                var submitButton = document.getElementById('submitButton');
                programSelect.innerHTML = ''; // Clearing previous options

                if (selectedDepartment === 'Engineering') {
                    var engineeringPrograms = ['Aerospace Engineering', 'Biomedical Engineering', 'Chemical Engineering', 'Civil Engineering', 'Computer Engineering', 'Electrical Engineering', 'Environmental Engineering', 'Industrial Engineering', 'Materials Engineering', 'Mechanical Engineering', 'Nuclear Engineering', 'Petroleum Engineering', 'Software Engineering', 'Systems Engineering'];
                    engineeringPrograms.forEach(function(program) {
                        var option = document.createElement('option');
                        option.text = program;
                        option.value = program;
                        programSelect.appendChild(option);
                    });
                } else if (selectedDepartment === 'Medical') {
                    var medicalPrograms = ['Medicine', 'Dentistry', 'Nursing', 'Pharmacy', 'Physiotherapy', 'Veterinary Medicine', 'Biomedical Science', 'Medical Laboratory Science', 'Radiography', 'Occupational Therapy', 'Speech-Language Pathology', 'Optometry', 'Podiatry', 'Chiropractic'];
                    medicalPrograms.forEach(function(program) {
                        var option = document.createElement('option');
                        option.text = program;
                        option.value = program;
                        programSelect.appendChild(option);
                    });
                } else if (selectedDepartment === 'Management') {
                    var managementPrograms = ['Business Administration', 'Marketing Management', 'Finance', 'Human Resource Management', 'Operations Management', 'Supply Chain Management', 'International Business', 'Entrepreneurship', 'Strategic Management', 'Information Systems Management', 'Project Management', 'Hospitality Management', 'Healthcare Management', 'Public Administration', 'Nonprofit Management'];
                    managementPrograms.forEach(function(program) {
                        var option = document.createElement('option');
                        option.text = program;
                        option.value = program;
                        programSelect.appendChild(option);
                    });
                }

                document.getElementById('programSelection').style.display = 'block';
                // Show or hide the submit button based on whether a program is selected
                submitButton.style.display = programSelect.value !== 'default' ? 'block' : 'none';
            }
        });
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="js/scripts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.8.0/Chart.min.js" crossorigin="anonymous"></script>
    <script src="assets/demo/chart-area-demo.js"></script>
    <script src="assets/demo/chart-bar-demo.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@latest" crossorigin="anonymous"></script>
    <script src="js/datatables-simple-demo.js"></script>
</body>
</html>
